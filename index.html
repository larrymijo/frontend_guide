        return `<button class="qnav-dot ${done?'done':''} ${fl?'flag':''}" data-go="${i}">${i+1}</button>`; }).join('');
    }
    const legend = `<div class="qnav-legend"><span><i style="background:var(--panel);border:1px solid var(--line)"></i>not done</span><span><i style="background:rgba(91,176,230,.4);border:1px solid var(--blue)"></i>${kind==='s2'?'marked':'answered'}</span>${kind!=='s2'?'<span><i style="background:var(--amber)"></i>flagged for review</span>':''}<span style="margin-left:auto">tap a number to jump</span></div>`;
    return `<div class="qnav-grid">${dots}</div>${legend}`;
  }
  function wireNavigator(){
    v.querySelectorAll('.qnav-dot').forEach(d=>d.addEventListener('click',()=>{
      const el=document.getElementById('qc-'+d.dataset.go);
      if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
    }));
  }

  function renderS1(){
    const cards = mcqSet.map((q,i)=>`
      <div class="q-card ${mcqFlag[i]?'flagged':''}" id="qc-${i}" style="margin-bottom:16px">
        <div class="q-top"><span class="q-counter">Q${i+1} / 20</span><span class="q-badge ${q.tag}">${q.tag.toUpperCase()}</span>
          <button class="flag-btn ${mcqFlag[i]?'on':''}" data-flag="${i}">${mcqFlag[i]?'★ flagged':'⚑ flag'}</button>
          <span class="q-counter" style="margin-left:auto">1 pt</span></div>
        <div class="q-stem">${q.q}</div>
        <div class="q-opts" data-q="${i}">
          ${q.opts.map((o,j)=>`<div class="opt ${mcqPick[i]===j?'sel':''}" data-i="${j}"><span class="ltr">${'ABCD'[j]}</span><span>${o}</span><span class="key">${'ABCD'[j]}</span></div>`).join('')}
        </div>
      </div>`).join('');
    v.innerHTML = bar() + secHead(1,'Multiple Choice','Select one answer per question. Click it again to clear (blank scores 0 — safer than −0.5 for a wrong guess).')
      + `<div class="kbd-tip">Tip: with a question on screen, press <b>A</b>–<b>D</b> to answer the first unanswered one, or just click. Flag anything you want to revisit.</div>`
      + navigator('s1') + cards + navBtns();
    v.querySelectorAll('.q-opts').forEach(box=>{
      const qi=+box.dataset.q;
      box.querySelectorAll('.opt').forEach(o=>o.addEventListener('click',()=>{
        const j=+o.dataset.i;
        if(mcqPick[qi]===j){ mcqPick[qi]=null; o.classList.remove('sel'); }
        else { mcqPick[qi]=j; box.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel')); o.classList.add('sel'); }
        refreshDot(qi,'s1'); updHint();
      }));
    });
    v.querySelectorAll('[data-flag]').forEach(b=>b.addEventListener('click',()=>{
      const qi=+b.dataset.flag; mcqFlag[qi]=!mcqFlag[qi];
      b.classList.toggle('on',mcqFlag[qi]); b.textContent=mcqFlag[qi]?'★ flagged':'⚑ flag';
      document.getElementById('qc-'+qi).classList.toggle('flagged',mcqFlag[qi]); refreshDot(qi,'s1');
    }));
    wireNavigator();
    // keyboard A–D answers the topmost question currently in view
    keyHandler = e=>{
      if(/^[a-dA-D]$/.test(e.key) && !/INPUT|TEXTAREA/.test(document.activeElement.tagName)){
        const j='abcd'.indexOf(e.key.toLowerCase());
        const qi=topVisibleCard(); if(qi<0)return;
        const box=v.querySelector(`.q-opts[data-q="${qi}"]`); if(!box)return;
        const opt=box.querySelector(`.opt[data-i="${j}"]`); if(opt)opt.click();
      }
    };
    document.addEventListener('keydown',keyHandler);
  }
  function topVisibleCard(){
    const cards=[...v.querySelectorAll('.q-card[id^="qc-"]')];
    const mid=window.innerHeight*0.4;
    for(const c of cards){ const r=c.getBoundingClientRect(); if(r.bottom>mid && r.top<window.innerHeight) return +c.id.slice(3); }
    return cards.length?+cards[0].id.slice(3):-1;
  }
  function refreshDot(i,kind){
    const dot=v.querySelector(`.qnav-dot[data-go="${i}"]`); if(!dot)return;
    let done=false;
    if(kind==='s1')done=mcqPick[i]!==null; else if(kind==='s2')done=fePicks[i].size>0; else done=(oeText[i]||'').trim().length>0;
    dot.classList.toggle('done',done);
    if(kind!=='s2')dot.classList.toggle('flag',kind==='s1'?mcqFlag[i]:oeFlag[i]);
  }

  function renderS2(){
    const cards = feSet.map((s,i)=>`
      <div class="q-card" id="qc-${i}" style="margin-bottom:16px">
        <div class="q-top"><span class="q-counter">Snippet ${i+1} / 9</span><span class="q-badge ${s.lang}">${s.lang.toUpperCase()}</span>
          <span class="marked-pill ${fePicks[i].size?'has':''}" id="mp-${i}">${fePicks[i].size} marked</span>
          <span class="q-counter" style="margin-left:auto">${esc(s.title)}</span></div>
        <div class="q-stem" style="font-size:14px;color:var(--ink-dim)">Click the specific wrong token(s). Most tokens are correct; circling correct code costs −0.25.</div>
        <div class="fe-code" data-s="${i}">${feMeta[i].html}</div>
      </div>`).join('');
    v.innerHTML = bar() + secHead(2,'Find the Errors','Three snippets each in HTML, CSS and JavaScript. Mark only what is actually wrong — precision beats quantity.')
      + navigator('s2') + cards + navBtns();
    v.querySelectorAll('.fe-code').forEach(box=>{
      const si=+box.dataset.s;
      box.querySelectorAll('.tok').forEach(t=>t.addEventListener('click',()=>{
        const id=t.dataset.id;
        if(fePicks[si].has(id)){fePicks[si].delete(id);t.classList.remove('picked');}
        else{fePicks[si].add(id);t.classList.add('picked');}
        const mp=document.getElementById('mp-'+si);
        mp.textContent=fePicks[si].size+' marked'; mp.classList.toggle('has',fePicks[si].size>0);
        refreshDot(si,'s2'); updHint();
      }));
      fePicks[si].forEach(id=>{ const el=box.querySelector('.tok[data-id="'+id+'"]'); if(el)el.classList.add('picked'); });
    });
    wireNavigator();
  }

  function renderS3(){
    const cards = oeSet.map((q,i)=>`
      <div class="oe-card ${oeFlag[i]?'flagged':''}" id="qc-${i}" style="margin-bottom:16px">
        <div class="q-top"><span class="q-counter">Q${i+1} / 10</span><span class="q-badge ${q.tag}">${q.tag.toUpperCase()}</span>
          <button class="flag-btn ${oeFlag[i]?'on':''}" data-flag="${i}">${oeFlag[i]?'★ flagged':'⚑ flag'}</button>
          <span class="q-counter" style="margin-left:auto">2 pts</span></div>
        <div class="oe-q">${q.q}</div>
        <textarea class="oe-area" data-q="${i}" placeholder="Write your answer…">${esc(oeText[i]||'')}</textarea>
      </div>`).join('');
    v.innerHTML = bar() + secHead(3,'Open-Ended','Answer only what each question asks. You will self-mark these against the model answers when you finish.')
      + navigator('s3') + cards + navBtns();
    v.querySelectorAll('.oe-area').forEach(t=>t.addEventListener('input',()=>{ oeText[+t.dataset.q]=t.value; refreshDot(+t.dataset.q,'s3'); updHint(); }));
    v.querySelectorAll('[data-flag]').forEach(b=>b.addEventListener('click',()=>{
      const qi=+b.dataset.flag; oeFlag[qi]=!oeFlag[qi];
      b.classList.toggle('on',oeFlag[qi]); b.textContent=oeFlag[qi]?'★ flagged':'⚑ flag';
      document.getElementById('qc-'+qi).classList.toggle('flagged',oeFlag[qi]); refreshDot(qi,'s3');
    }));
    wireNavigator();
  }

  /* ---------- grading + review ---------- */
  function grade(timeUp){
    stopTimer();
    if(keyHandler){ document.removeEventListener('keydown',keyHandler); keyHandler=null; }
    let s1=0,c=0,w=0,bl=0;
    mcqSet.forEach((q,i)=>{ const p=mcqPick[i]; if(p===null){bl++;} else if(p===q.c){s1+=1;c++;} else {s1-=0.5;w++;} });
    s1=Math.max(0,s1);
    let found=0,wrong=0,totErr=0;
    const byArea={html:{mc:0,mn:0,ff:0,ft:0,fw:0},css:{mc:0,mn:0,ff:0,ft:0,fw:0},js:{mc:0,mn:0,ff:0,ft:0,fw:0}};
    mcqSet.forEach((q,i)=>{ const a=byArea[q.tag]; if(a){a.mn++; if(mcqPick[i]===q.c)a.mc++;} });
    feSet.forEach((s,i)=>{ const m=feMeta[i]; totErr+=m.errCount;
      const a=byArea[s.lang]; if(a)a.ft+=m.errCount;
      fePicks[i].forEach(id=>{ if(m.errIds.has(id)){found++; if(a)a.ff++;} else {wrong++; if(a)a.fw++;} });
    });
    const s2 = totErr ? Math.max(0,found-0.25*wrong)/totErr*30 : 0;
    gradeData={timeUp,s1,c,w,bl,found,wrong,totErr,s2,byArea};
    renderReview();
  }

  function s3total(){ return oeScore.reduce((n,x)=>n+(x||0),0); }
  function gradeOf(total,s3){
    if(total>=63 && s3>=9) return 5;
    if(total>=53 && s3>=7) return 4;
    if(total>=42 && s3>=5) return 3;
    return 0;
  }
  function scorecard(){
    const s3=s3total(), total=gradeData.s1+gradeData.s2+s3, g=gradeOf(total,s3);
    const gColor = g>=5?'var(--grn)':g>=4?'var(--grn-soft)':g>=3?'var(--amber)':'var(--red)';
    const marked = oeScore.filter(x=>x!==null).length;
    let gate;
    if(g===0){
      gate = total<42 ? `Total <b>${total.toFixed(1)}</b> is below the 42-point pass line.`
                      : `Total <b>${total.toFixed(1)}</b> clears 42, but open-ended <b>${s3}/20</b> is below the 5-point gate — not a pass yet.`;
    } else {
      gate = `<b>Grade ${g}</b> secured.` + (g<5?` Next up — grade ${g+1}: ${g===3?53:63} total and ${g===3?7:9} open-ended.`:` Top marks. 🏆`);
    }
    if(marked<10) gate += ` <span style="color:var(--ink-dim)">(${marked}/10 open-ended marked — finish marking for your final grade.)</span>`;
    return `<div class="mock-score">
      <div class="mock-grade" style="color:${gColor}">${g===0?'U':g}</div>
      <div class="pct" style="margin-top:4px;font-size:16px">${total.toFixed(1)} / 70${gradeData.timeUp?' · ⏰ time expired':''}</div>
      <div class="mock-breakdown">
        <div class="mb"><b>${gradeData.s1.toFixed(1)}</b><span>S1 · MCQ /20<br>${gradeData.c}✓ · ${gradeData.w}✗ · ${gradeData.bl} blank</span></div>
        <div class="mb"><b>${gradeData.s2.toFixed(1)}</b><span>S2 · Errors /30<br>${gradeData.found}/${gradeData.totErr} found · ${gradeData.wrong} wrong</span></div>
        <div class="mb"><b>${s3}</b><span>S3 · Open /20<br>${marked}/10 self-marked</span></div>
      </div>
      <div class="mock-gate" style="color:${g===0?'var(--amber)':'var(--grn-soft)'}">${gate}</div>
    </div>`;
  }

  function areaPerf(){
    const COLORS={html:'#5bb0e6',css:'#f4b740',js:'#7ec64a'};
    const ADVICE={
      html:'semantic containers (article vs section vs div), forms (label/for, name), tables & void elements',
      css:'box-model maths & border-box, specificity, flexbox vs grid axes, positioning',
      js:'async/await & promises, prototypes vs classes, loops & the type quirks (typeof, == vs ===)'
    };
    const rows=[], accs={};
    ['html','css','js'].forEach(k=>{
      const a=gradeData.byArea[k];
      const mcqAcc = a.mn? a.mc/a.mn : null;
      const feAcc  = a.ft? Math.max(0,a.ff-0.25*a.fw)/a.ft : null;
      const parts=[mcqAcc,feAcc].filter(x=>x!==null);
      const acc = parts.length? parts.reduce((x,y)=>x+y,0)/parts.length : 0;
      accs[k]=acc;
      const pct=Math.round(acc*100);
      rows.push(`<div class="area-row">
        <span class="al" style="color:${COLORS[k]}">${k.toUpperCase()}</span>
        <div class="area-track"><div class="area-fill" style="width:${pct}%;background:${COLORS[k]}"></div></div>
        <span class="av">${pct}% · ${a.mc}/${a.mn} mcq · ${a.ff}/${a.ft} err</span>
      </div>`);
    });
    const weakest=['html','css','js'].sort((x,y)=>accs[x]-accs[y])[0];
    const strong = accs[weakest]>=0.85;
    return `<div class="area-perf">
      <h4>Performance by area</h4>
      ${rows.join('')}
      <div class="area-advice">${strong
        ? `Solid across the board — keep all three warm with mixed drills.`
        : `<b>Weakest area: ${weakest.toUpperCase()}.</b> Prioritise: ${ADVICE[weakest]}. <a style="color:var(--grn-soft);cursor:pointer" onclick="go('study')">→ open the study guide</a>`}</div>
    </div>`;
  }

  function renderReview(){
    stopTimer();
    const s3cards = oeSet.map((q,i)=>`
      <div class="oe-card ${oeScore[i]===null?'unmarked':'marked'}" id="sm-${i}" style="margin-bottom:16px">
        <div class="q-top"><span class="q-counter">Q${i+1}</span><span class="q-badge ${q.tag}">${q.tag.toUpperCase()}</span><span class="q-counter" style="margin-left:auto">self-mark /2</span></div>
        <div class="oe-q">${q.q}</div>
        <div class="your-ans">${oeText[i] && oeText[i].trim() ? esc(oeText[i]) : '(left blank)'}</div>
        <div class="model show"><h5>★ Model answer</h5>${q.model.map(p=>`<p>${p}</p>`).join('')}<div class="rubric"><b>Credit for:</b><ul>${q.rubric.map(r=>`<li>${r}</li>`).join('')}</ul></div></div>
        <div class="oe-mark" data-q="${i}"><span style="color:var(--ink-dim);font-size:12.5px;margin-right:4px">Your score:</span>
          <button data-v="0" class="${oeScore[i]===0?'on':''}">0</button>
          <button data-v="1" class="${oeScore[i]===1?'on':''}">1</button>
          <button data-v="2" class="${oeScore[i]===2?'on':''}">2</button>
        </div>
      </div>`).join('');

    const s1cards = mcqSet.map((q,i)=>{ const p=mcqPick[i], ok=p===q.c;
      return `<div class="q-card" style="margin-bottom:14px">
        <div class="q-top"><span class="q-counter">Q${i+1}</span><span class="q-badge ${q.tag}">${q.tag.toUpperCase()}</span>
          <span class="q-counter" style="margin-left:auto;color:${p===null?'var(--ink-dim)':ok?'var(--ok)':'var(--red)'}">${p===null?'blank · 0':ok?'+1':'−0.5'}</span></div>
        <div class="q-stem">${q.q}</div>
        <div class="q-opts">${q.opts.map((o,j)=>{ let cls='opt dim'; if(j===q.c)cls='opt correct'; if(j===p&&!ok)cls='opt wrong';
          return `<div class="${cls}"><span class="ltr">${'ABCD'[j]}</span><span>${o}</span></div>`;}).join('')}</div>
        <div class="explain show"><p>${q.ex}</p></div>
      </div>`; }).join('');

    const s2cards = feSet.map((s,i)=>{ const m=feMeta[i];
      const f=[...fePicks[i]].filter(id=>m.errIds.has(id)).length, wr=[...fePicks[i]].filter(id=>!m.errIds.has(id)).length;
      return `<div class="q-card" style="margin-bottom:14px">
        <div class="q-top"><span class="q-counter">Snippet ${i+1}</span><span class="q-badge ${s.lang}">${s.lang.toUpperCase()}</span>
          <span class="q-counter" style="margin-left:auto">${f}/${m.errCount} found · ${wr} wrong</span></div>
        <div class="fe-code">${reviewTokens(s,i)}</div>
        <div class="errlist show"><h5>Errors in this snippet</h5>${Object.keys(m.reasons).map(id=>{const r=m.reasons[id];return `<div class="ei">${r.why}${r.ref?` <a class="ei-ref" onclick="openTopic('${r.ref}')">→ review the theory</a>`:''}</div>`;}).join('')}</div>
      </div>`; }).join('');

    v.innerHTML = `
      <div class="hero" style="padding:26px 0 4px"><div class="kicker">Mock exam · results</div><h2 style="font-size:28px;font-family:var(--disp)">Your result</h2></div>
      <div id="mockScore">${scorecard()}</div>
      ${areaPerf()}
      <div class="mock-yan">Section 3 · self-mark your answers</div>
      <div class="oe-selfmark-banner" id="smBanner"></div>
      <p class="lede" style="font-size:14px;margin:6px 0 12px">Compare each answer to the model and award <b>0</b>, <b>1</b>, or <b>2</b>. Be strict — credit only the rubric points you actually made. Your total and grade update live above.</p>
      ${s3cards}
      <div class="mock-yan">Section 1 · MCQ review</div>${s1cards}
      <div class="mock-yan">Section 2 · error review</div>${s2cards}
      <div style="margin:26px 0;display:flex;gap:10px;flex-wrap:wrap">
        <button class="bigbtn" id="retake">↻ Retake mock (new questions)</button>
        <button class="bigbtn ghost" onclick="go('study')">Back to study</button>
        <button class="bigbtn ghost" onclick="go('home')">Overview</button>
      </div>`;
    function updBanner(){
      const marked=oeScore.filter(x=>x!==null).length, pts=s3total();
      const b=document.getElementById('smBanner'); if(!b)return;
      if(marked===10){ b.className='oe-selfmark-banner done';
        b.innerHTML=`<b style="color:var(--ok)">✓ All 10 marked</b><span>Section 3 total: <b>${pts}/20</b></span><span style="color:var(--ink-dim)">Your grade above is now final.</span>`;
      } else { b.className='oe-selfmark-banner';
        b.innerHTML=`<b style="color:var(--amber)">${marked}/10 marked</b><span>so far: ${pts} pts</span><span style="color:var(--ink-dim)">Mark the remaining ${10-marked} to finalise your grade.</span>`;
      }
    }
    v.querySelectorAll('.oe-mark').forEach(box=>{ const qi=+box.dataset.q;
      box.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{
        oeScore[qi]=+b.dataset.v;
        box.querySelectorAll('button').forEach(x=>x.classList.remove('on')); b.classList.add('on');
        const card=document.getElementById('sm-'+qi); if(card){card.classList.remove('unmarked');card.classList.add('marked');}
        document.getElementById('mockScore').innerHTML=scorecard();
        updBanner();
      }));
    });
    updBanner();
    v.querySelector('#retake').addEventListener('click',()=>{ sample(); startTimer(); sec='s1'; renderSection(); window.scrollTo({top:0,behavior:'smooth'}); });
    window.scrollTo({top:0,behavior:'smooth'});
  }

  intro();
})();

      ${card('🏗️','HTML — skeleton & docs',[

      ${card('🧱','HTML — semantic tags',[
        ['Structure','<code>header</code>, <code>nav</code>, <code>main</code>, <code>section</code>, <code>article</code>, <code>aside</code>, <code>footer</code>.'],

        ['Images','<code>&lt;img src="x.png" alt="..."&gt;</code> — void element, uses <code>src</code> not <code>href</code>, no closing tag, <code>alt</code> is for accessibility.'],
        ['Multimedia','<code>&lt;audio&gt;</code>/<code>&lt;video&gt;</code> with <code>&lt;source&gt;</code> children + <code>controls</code> attribute.']
      ])}

      ${card('📝','HTML — forms',[
        ['&lt;form&gt;','<code>action</code> (URL) + <code>method</code> (<code>get</code>/<code>post</code>).'],
        ['&lt;input&gt;','<code>type</code> = text/email/password/checkbox/radio/number/submit… Void element.'],
        ['&lt;label&gt;','<code>&lt;label for="id"&gt;</code> tied to <code>&lt;input id="id"&gt;</code> — clickable + accessible.'],
        ['Others','<code>&lt;textarea&gt;</code>, <code>&lt;select&gt;</code>→<code>&lt;option&gt;</code>, <code>&lt;button&gt;</code>. Group with <code>&lt;fieldset&gt;</code>+<code>&lt;legend&gt;</code>.']
      ])}

      ${card('🎯','CSS — selectors & specificity',[
        ['Basics','<code>tag</code>, <code>.class</code>, <code>#id</code>, <code>*</code> (universal).'],
        ['Combinators','<code>A B</code> descendant · <code>A &gt; B</code> child · <code>A + B</code> next sibling · <code>A ~ B</code> all siblings.'],
        ['Specificity','inline (1000) &gt; id (100) &gt; class/attr/pseudo-class (10) &gt; element/pseudo-element (1). Ties → later rule wins.'],
        ['!important','Overrides specificity. Last resort — usually a code smell.']
      ])}

      ${card('📦','CSS — box model',[
        ['Layers','content → <code>padding</code> → <code>border</code> → <code>margin</code> (inside-out).'],

        ['Margin collapse','Vertical margins between blocks collapse to the larger one.'],

      ])}

        ['float','<code>left</code>/<code>right</code>/<code>none</code> — legacy layout; <code>clear</code> to stop wrapping.'],

        ['Items','<code>flex-grow</code> / <code>flex-shrink</code> / <code>flex-basis</code> (shorthand <code>flex</code>). <code>flex-wrap:wrap</code> to wrap. <code>gap</code> for spacing.']

      ${card('🔲','CSS — Grid',[

        ['Placement','<code>grid-column: 1 / 3</code> spans lines 1→3. <code>grid-template-areas</code> for named layout.'],
