<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DA218D — Frontend Dev Techniques · Exam Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1115; --bg2:#161a21; --panel:#1b212b; --panel2:#222a36;
  --ink:#e8ecf1; --ink-dim:#9aa6b6; --line:#2c3542;
  --grn:#7ec64a; --grn-deep:#5aa233; --grn-soft:#a9e07f;
  --amber:#f4b740; --red:#ef5f5f; --blue:#5bb0e6; --violet:#b48ce0;
  --ok:#3ecf8e; --shadow:0 18px 50px -20px rgba(0,0,0,.7);
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --disp:'Fraunces',Georgia,serif;
  --body:'Space Grotesk',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:
    radial-gradient(1100px 600px at 88% -8%, rgba(126,198,74,.10), transparent 60%),
    radial-gradient(900px 500px at -5% 12%, rgba(91,176,230,.08), transparent 55%),
    var(--bg);
  color:var(--ink); font-family:var(--body); line-height:1.55;
  -webkit-font-smoothing:antialiased; padding-bottom:90px;
}
a{color:var(--grn-soft)}
.wrap{max-width:1180px;margin:0 auto;padding:0 22px}

/* ---------- top bar ---------- */
header.top{
  position:sticky;top:0;z-index:50;
  backdrop-filter:blur(12px);
  background:linear-gradient(180deg, rgba(15,17,21,.92), rgba(15,17,21,.72));
  border-bottom:1px solid var(--line);
}
.top-inner{display:flex;align-items:center;gap:16px;padding:13px 22px;max-width:1180px;margin:0 auto;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:12px;margin-right:auto}
.logo{
  width:42px;height:42px;border-radius:11px;flex:none;
  background:linear-gradient(135deg,var(--grn),var(--grn-deep));
  display:grid;place-items:center;font-family:var(--disp);font-weight:900;
  color:#0c1408;font-size:21px;box-shadow:0 6px 18px -6px rgba(126,198,74,.7);
}
.brand h1{font-family:var(--disp);font-weight:900;font-size:19px;letter-spacing:-.4px;line-height:1.05}
.brand span{display:block;font-size:11.5px;color:var(--ink-dim);font-weight:500;letter-spacing:.3px}
.progress-mini{display:flex;align-items:center;gap:9px;font-size:12px;color:var(--ink-dim);font-family:var(--mono)}
.pbar{width:128px;height:7px;border-radius:99px;background:var(--panel2);overflow:hidden}
.pbar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--grn-deep),var(--grn));transition:width .5s ease;border-radius:99px}

/* ---------- nav tabs ---------- */
nav.tabs{display:flex;gap:6px;overflow-x:auto;padding:10px 22px;max-width:1180px;margin:0 auto;scrollbar-width:none}
nav.tabs::-webkit-scrollbar{display:none}
.tab{
  flex:none;border:1px solid var(--line);background:var(--panel);
  color:var(--ink-dim);padding:8px 15px;border-radius:99px;font-size:13px;
  font-weight:500;cursor:pointer;white-space:nowrap;transition:.18s;font-family:var(--body)}
.tab:hover{color:var(--ink);border-color:#3a4655}
.tab.active{background:linear-gradient(135deg,var(--grn),var(--grn-deep));color:#0c1408;border-color:transparent;font-weight:700}
.tab .em{font-size:14px;margin-right:5px}

/* ---------- views ---------- */
.view{display:none;animation:fade .4s ease}
.view.show{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
section.block{padding:34px 0 8px}

/* hero */
.hero{padding:46px 0 22px}
.hero .kicker{font-family:var(--mono);color:var(--grn);font-size:12.5px;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:14px}
.hero h2{font-family:var(--disp);font-size:clamp(33px,5.4vw,58px);font-weight:900;line-height:1.02;letter-spacing:-1.4px;margin-bottom:16px}
.hero h2 em{font-style:italic;color:var(--grn-soft)}
.hero p.lead{font-size:17px;color:var(--ink-dim);max-width:660px}
.exam-meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:26px}
.chip{border:1px solid var(--line);background:var(--panel);border-radius:11px;padding:11px 15px;font-size:13px;display:flex;align-items:center;gap:9px}
.chip b{font-family:var(--mono);color:var(--grn-soft)}

/* section structure cards */
.struct{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:8px}
.scard{border:1px solid var(--line);background:linear-gradient(180deg,var(--panel),var(--bg2));border-radius:16px;padding:22px;position:relative;overflow:hidden}
.scard::before{content:'';position:absolute;inset:0 0 auto 0;height:3px;background:var(--accent,var(--grn))}
.scard .sec-no{font-family:var(--mono);font-size:12px;color:var(--ink-dim)}
.scard h3{font-family:var(--disp);font-size:21px;font-weight:600;margin:6px 0 4px}
.scard .pts{font-family:var(--mono);font-size:13px;color:var(--accent,var(--grn-soft));font-weight:700}
.scard p{font-size:13.5px;color:var(--ink-dim);margin-top:9px}
.scard .scoring{margin-top:13px;font-size:12px;font-family:var(--mono);color:var(--ink-dim);border-top:1px dashed var(--line);padding-top:11px}

/* grade ladder */
.grades{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:6px}
.gcard{border:1px solid var(--line);border-radius:14px;padding:18px;text-align:center;background:var(--panel)}
.gcard .g{font-family:var(--disp);font-size:42px;font-weight:900;line-height:1}
.gcard.g3 .g{color:var(--blue)} .gcard.g4 .g{color:var(--amber)} .gcard.g5 .g{color:var(--grn)}
.gcard .req{font-size:13px;margin-top:8px;color:var(--ink-dim)}
.gcard .req b{color:var(--ink);font-family:var(--mono)}

/* generic heading */
.sec-head{display:flex;align-items:baseline;gap:14px;margin:4px 0 20px}
.sec-head h2{font-family:var(--disp);font-size:30px;font-weight:900;letter-spacing:-.7px}
.sec-head .tag{font-family:var(--mono);font-size:12px;color:var(--grn);border:1px solid var(--line);padding:4px 10px;border-radius:99px}
.sec-head p{color:var(--ink-dim);font-size:14px}
.lede{color:var(--ink-dim);font-size:15px;max-width:720px;margin-bottom:24px}

/* topic accordions */
.topic{border:1px solid var(--line);border-radius:14px;margin-bottom:13px;background:var(--panel);overflow:hidden;transition:.2s}
.topic.open{border-color:#3c4a5b;box-shadow:var(--shadow)}
.t-head{display:flex;align-items:center;gap:14px;padding:17px 19px;cursor:pointer;user-select:none}
.t-head:hover{background:var(--panel2)}
.t-ico{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;font-size:17px;flex:none;background:var(--bg2);border:1px solid var(--line)}
.t-head h3{font-size:16px;font-weight:600;flex:1;font-family:var(--body)}
.t-head .lec{font-family:var(--mono);font-size:11px;color:var(--ink-dim);background:var(--bg);padding:3px 9px;border-radius:99px;border:1px solid var(--line)}
.t-head .caret{transition:.25s;color:var(--ink-dim);font-size:13px}
.topic.open .caret{transform:rotate(90deg);color:var(--grn)}
.t-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
.t-inner{padding:4px 22px 22px;border-top:1px solid var(--line)}
.t-inner h4{font-family:var(--disp);font-size:16px;font-weight:600;margin:18px 0 8px;color:var(--grn-soft)}
.t-inner p{font-size:14.5px;margin:8px 0;color:#d2d9e2}
.t-inner ul{margin:8px 0 8px 4px;list-style:none}
.t-inner li{font-size:14px;margin:7px 0;padding-left:22px;position:relative;color:#cfd6e0}
.t-inner li::before{content:'▸';position:absolute;left:4px;color:var(--grn);font-size:12px;top:1px}
.t-inner li b, .t-inner p b{color:#fff}
kbd,code.inl{font-family:var(--mono);font-size:.86em;background:var(--bg);border:1px solid var(--line);border-radius:5px;padding:1px 6px;color:var(--grn-soft)}
.callout{border-left:3px solid var(--amber);background:rgba(244,183,64,.07);padding:12px 15px;border-radius:0 10px 10px 0;margin:14px 0;font-size:13.5px}
.callout.tip{border-color:var(--grn);background:rgba(126,198,74,.07)}
.callout.warn{border-color:var(--red);background:rgba(239,95,95,.07)}
.callout b{color:#fff}

/* code blocks */
pre.code{font-family:var(--mono);font-size:13px;background:#0a0c10;border:1px solid var(--line);border-radius:11px;padding:15px 16px;overflow-x:auto;margin:12px 0;line-height:1.6;position:relative}
pre.code .cm{color:#5f6b7a;font-style:italic}
pre.code .kw{color:#b48ce0}
pre.code .str{color:#a9e07f}
pre.code .tag{color:#5bb0e6}
pre.code .at{color:#f4b740}
pre.code .fn{color:#7ec64a}
pre.code .num{color:#f4b740}
.code-label{position:absolute;top:8px;right:12px;font-size:10px;color:var(--ink-dim);letter-spacing:1px;text-transform:uppercase}

/* compare table */
.ctable{width:100%;border-collapse:collapse;margin:14px 0;font-size:13.5px}
.ctable th,.ctable td{border:1px solid var(--line);padding:10px 13px;text-align:left;vertical-align:top}
.ctable th{background:var(--bg2);font-family:var(--mono);font-size:12px;color:var(--grn-soft);font-weight:700}
.ctable td code{color:var(--blue)}

/* ===== PLAYGROUND ===== */
.pg-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:6px}
.pg-pane{border:1px solid var(--line);border-radius:14px;background:var(--panel);overflow:hidden;display:flex;flex-direction:column;min-height:440px}
.pg-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--line);background:var(--bg2)}
.pg-bar .dot{width:11px;height:11px;border-radius:50%}
.pg-bar .ttl{font-family:var(--mono);font-size:12px;color:var(--ink-dim);margin-left:4px}
.pg-bar .right{margin-left:auto;display:flex;gap:7px}
.pg-editor{flex:1;font-family:var(--mono);font-size:13px;line-height:1.6;color:var(--ink);background:#0a0c10;border:0;outline:0;padding:14px;resize:none;tab-size:2;width:100%}
.pg-out{flex:1;background:#fff;border:0}
.pg-out iframe{width:100%;height:100%;border:0;background:#fff}
.lint{border-top:1px solid var(--line);max-height:150px;overflow:auto;background:var(--bg2);font-family:var(--mono);font-size:12px}
.lint .row{padding:8px 14px;border-bottom:1px solid var(--line);display:flex;gap:9px;align-items:flex-start}
.lint .row:last-child{border-bottom:0}
.lint .row.err{color:#ffb4b4}.lint .row.warn{color:#ffd98a}.lint .row.ok{color:var(--grn-soft)}
.lint .ln{flex:none;background:var(--bg);border:1px solid var(--line);border-radius:5px;padding:0 7px;font-size:11px}
.minibtn{font-family:var(--body);font-size:12px;font-weight:600;border:1px solid var(--line);background:var(--panel);color:var(--ink);padding:6px 12px;border-radius:8px;cursor:pointer;transition:.15s}
.minibtn:hover{border-color:var(--grn);color:var(--grn-soft)}
.minibtn.primary{background:linear-gradient(135deg,var(--grn),var(--grn-deep));color:#0c1408;border-color:transparent}
.lang-pick{display:flex;gap:6px}
.snip-pick{display:flex;gap:7px;flex-wrap:wrap;margin:14px 0}
.snip{font-size:12px;border:1px solid var(--line);background:var(--panel);color:var(--ink-dim);padding:7px 12px;border-radius:9px;cursor:pointer;transition:.15s}
.snip:hover{color:var(--ink);border-color:#3a4655}

/* ===== QUIZ ===== */
.quiz-setup{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:6px 0 22px}
.qmode{border:1px solid var(--line);border-radius:14px;padding:20px;cursor:pointer;transition:.18s;background:var(--panel);text-align:left}
.qmode:hover{border-color:var(--grn);transform:translateY(-3px)}
.qmode .em{font-size:26px}
.qmode h3{font-family:var(--disp);font-size:18px;font-weight:600;margin:9px 0 5px}
.qmode p{font-size:12.5px;color:var(--ink-dim)}
.q-card{border:1px solid var(--line);border-radius:16px;background:var(--panel);padding:24px;box-shadow:var(--shadow)}
.q-top{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.q-counter{font-family:var(--mono);font-size:12px;color:var(--ink-dim)}
.q-badge{font-family:var(--mono);font-size:11px;padding:3px 10px;border-radius:99px;border:1px solid var(--line)}
.q-badge.html{color:#e88}.q-badge.css{color:var(--blue)}.q-badge.js{color:var(--amber)}.q-badge.new{color:var(--grn);border-color:var(--grn-deep)}
.q-stem{font-size:16.5px;font-weight:500;margin-bottom:6px;line-height:1.5}
.q-stem code{font-family:var(--mono);font-size:.9em;background:var(--bg);padding:1px 6px;border-radius:5px;color:var(--grn-soft)}
.q-opts{display:flex;flex-direction:column;gap:9px;margin-top:14px}
.opt{border:1px solid var(--line);border-radius:11px;padding:13px 15px;cursor:pointer;transition:.13s;display:flex;gap:12px;align-items:flex-start;font-size:14.5px;background:var(--bg2)}
.opt:hover{border-color:#46566a}
.opt .ltr{font-family:var(--mono);font-weight:700;color:var(--ink-dim);flex:none;width:20px}
.opt code{font-family:var(--mono);font-size:.9em;color:var(--grn-soft)}
.opt.correct{border-color:var(--ok);background:rgba(62,207,142,.12)}
.opt.correct .ltr{color:var(--ok)}
.opt.wrong{border-color:var(--red);background:rgba(239,95,95,.12)}
.opt.wrong .ltr{color:var(--red)}
.opt.dim{opacity:.5}
.explain{margin-top:16px;border-top:1px solid var(--line);padding-top:15px;font-size:14px;display:none;animation:fade .3s}
.explain.show{display:block}
.explain .verdict{font-weight:700;font-family:var(--disp);font-size:16px;margin-bottom:7px}
.explain .verdict.right{color:var(--ok)}.explain .verdict.miss{color:var(--red)}
.explain p{color:#d2d9e2;font-size:14px}
.explain code{font-family:var(--mono);font-size:.88em;background:var(--bg);padding:1px 6px;border-radius:5px;color:var(--grn-soft)}
.q-nav{display:flex;gap:10px;margin-top:20px;align-items:center}
.q-nav .spacer{flex:1}
.bigbtn{font-family:var(--body);font-weight:700;font-size:14px;border:0;border-radius:11px;padding:12px 22px;cursor:pointer;transition:.15s;background:linear-gradient(135deg,var(--grn),var(--grn-deep));color:#0c1408}
.bigbtn:hover{filter:brightness(1.08)}
.bigbtn.ghost{background:var(--panel);border:1px solid var(--line);color:var(--ink)}
.bigbtn:disabled{opacity:.4;cursor:not-allowed}

/* find-error quiz */
.fe-code{font-family:var(--mono);font-size:13.5px;background:#0a0c10;border:1px solid var(--line);border-radius:12px;padding:18px;line-height:1.85;margin:14px 0;white-space:pre;overflow-x:auto}
.tok{cursor:pointer;border-radius:4px;padding:1px 2px;transition:.12s;border:1px solid transparent}
.tok:hover{background:rgba(255,255,255,.07)}
.tok.picked{background:rgba(244,183,64,.25);border-color:var(--amber)}
.tok.hit{background:rgba(62,207,142,.28);border-color:var(--ok)}
.tok.miss-pick{background:rgba(239,95,95,.28);border-color:var(--red);text-decoration:line-through}
.tok.missed{background:rgba(91,176,230,.22);border-color:var(--blue);outline:1px dashed var(--blue)}
.fe-help{font-size:12.5px;color:var(--ink-dim);margin:6px 0 2px;font-family:var(--mono)}
.fe-score{font-family:var(--mono);font-size:13px;margin-top:10px}
.errlist{margin-top:14px;border-top:1px solid var(--line);padding-top:14px;display:none}
.errlist.show{display:block}
.errlist h5{font-family:var(--disp);font-size:15px;margin-bottom:9px;color:var(--grn-soft)}
.errlist .ei{font-size:13.5px;margin:8px 0;padding-left:20px;position:relative;color:#d2d9e2}
.errlist .ei::before{content:'✕';position:absolute;left:0;color:var(--red);font-weight:700}
.errlist .ei code{font-family:var(--mono);background:var(--bg);padding:1px 5px;border-radius:4px;color:var(--amber)}

/* open-ended */
.oe-card{border:1px solid var(--line);border-radius:16px;background:var(--panel);padding:24px;margin-bottom:16px}
.oe-q{font-size:16px;font-weight:500;line-height:1.5;margin-bottom:6px}
.oe-q code{font-family:var(--mono);font-size:.9em;background:var(--bg);padding:1px 6px;border-radius:5px;color:var(--grn-soft)}
.oe-area{width:100%;min-height:120px;background:#0a0c10;border:1px solid var(--line);border-radius:11px;padding:14px;color:var(--ink);font-family:var(--body);font-size:14px;resize:vertical;line-height:1.6;margin:12px 0}
.oe-area:focus{outline:0;border-color:var(--grn-deep)}
.model{border-top:1px solid var(--line);padding-top:16px;margin-top:8px;display:none;animation:fade .3s}
.model.show{display:block}
.model h5{font-family:var(--disp);font-size:15px;color:var(--ok);margin-bottom:8px}
.model p{font-size:14px;color:#d2d9e2;margin:7px 0}
.model .rubric{margin-top:12px;background:var(--bg2);border-radius:10px;padding:13px 15px;font-size:13px}
.model .rubric b{color:var(--grn-soft)}
.model ul{margin:8px 0 0 4px;list-style:none}
.model li{font-size:13.5px;margin:6px 0;padding-left:22px;position:relative;color:#cfd6e0}
.model li::before{content:'✓';position:absolute;left:2px;color:var(--ok)}

/* results */
.result{text-align:center;padding:30px}
.result .score{font-family:var(--disp);font-size:74px;font-weight:900;line-height:1}
.result .pct{color:var(--ink-dim);font-family:var(--mono);margin-top:6px}
.result .verdict-grade{font-family:var(--disp);font-size:24px;margin-top:18px}

/* cheat sheet */
.cheat-grid{columns:2;column-gap:16px}
@media(max-width:760px){.cheat-grid{columns:1}}
.cheat{border:1px solid var(--line);border-radius:13px;background:var(--panel);padding:16px 18px;margin-bottom:16px;break-inside:avoid}
.cheat h4{font-family:var(--disp);font-size:16px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.cheat dl{font-size:13px}
.cheat dt{font-family:var(--mono);color:var(--grn-soft);margin-top:9px;font-size:12.5px}
.cheat dd{color:var(--ink-dim);margin:2px 0 0}
.cheat dd code{color:var(--blue);font-family:var(--mono)}

footer.foot{border-top:1px solid var(--line);margin-top:50px;padding:26px 0;text-align:center;color:var(--ink-dim);font-size:12.5px}

@media(max-width:860px){
  .struct,.grades{grid-template-columns:1fr}
  .pg-grid{grid-template-columns:1fr}
  .progress-mini{display:none}
}
</style>
</head>

<div id="app"></div>

<script>

/* ===== inlined: diagrams.js ===== */
/* ============================================================
   CONCEPT DIAGRAMS  (inline dark-theme SVG)
   Loaded BEFORE data-topics.js so topic bodies can embed ${DIAG.x}.
   Palette is hard-coded to match the app theme (no var() edge cases).
   ============================================================ */
const fig = (svg, cap) => `<figure class="diagram">${svg}<figcaption>${cap}</figcaption></figure>`;
const FF = "font-family:'Space Grotesk',system-ui,sans-serif";
const MF = "font-family:'JetBrains Mono',monospace";

const DIAG = {

  /* ---------- BOX MODEL ---------- */
  boxModel: fig(`<svg viewBox="0 0 540 290" role="img" aria-label="The CSS box model">
    <rect x="12" y="12" width="516" height="266" rx="10" fill="#161a21" stroke="#9aa6b6" stroke-dasharray="5 4"/>
    <text x="24" y="32" style="${MF}" font-size="12" fill="#9aa6b6">margin</text>
    <rect x="74" y="50" width="392" height="190" rx="8" fill="#222a36" stroke="#9aa6b6"/>
    <text x="86" y="69" style="${MF}" font-size="12" fill="#e8ecf1">border</text>
    <rect x="126" y="88" width="288" height="114" rx="6" fill="#1e3326" stroke="#5aa233"/>
    <text x="138" y="107" style="${MF}" font-size="12" fill="#a9e07f">padding</text>
    <rect x="178" y="120" width="184" height="50" rx="4" fill="#173243" stroke="#5bb0e6"/>
    <text x="270" y="142" text-anchor="middle" style="${MF}" font-size="12" fill="#5bb0e6">content</text>
    <text x="270" y="158" text-anchor="middle" style="${FF}" font-size="10.5" fill="#9aa6b6">width × height</text>
  </svg>`, 'Four nested layers, inside-out. The background fills <b>content + padding</b>; <b>margin</b> is always transparent space between neighbours.'),

  /* ---------- BOX-SIZING ---------- */

/* ---------- robust syntax highlighter (placeholder-based: inserted
   markup is stashed so later passes can never re-match it) ---------- */
function hl(code, lang){
  const slots = [];
  const mk = (cls, txt) => { slots.push('<span class="'+cls+'">'+txt+'</span>'); return '\uE000'+String.fromCharCode(0xE100 + slots.length - 1); };
  let s = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  if(lang==='html'){
    s = s.replace(/&lt;!--[\s\S]*?--&gt;/g, m => mk('cm', m));
    s = s.replace(/&lt;!DOCTYPE[^&]*&gt;/gi, m => mk('kw', m));
    s = s.replace(/(&lt;\/?)([a-zA-Z][\w-]*)((?:[^&]|&(?!gt;))*?)(\/?&gt;)/g,
      (m, lt, name, attrs, gt) => {
        const a = attrs.replace(/([a-zA-Z-]+)(=)("[^"]*"|'[^']*')/g,
                    (mm, an, eq, val) => mk('atr', an) + eq + mk('str', val));
        return lt + mk('tg', name) + a + gt;
      });
  } else if(lang==='css'){
    s = s.replace(/(\/\*[\s\S]*?\*\/|"[^"]*"|'[^']*')/g, m => mk(m[0]==='/' ? 'cm' : 'str', m));
    s = s.replace(/^(\s*)([.#]?[a-zA-Z*][\w\-\s,>+~:.#()'"=\[\]]*?)(\s*\{)/gm, (m, ws, sel, br) => ws + mk('fn', sel) + br);
    s = s.replace(/(@[a-z-]+)/gi, m => mk('kw', m));
    s = s.replace(/(^\s*|[{;]\s*)([a-z-]+)(\s*:)/gm, (m, pre, prop, c) => pre + mk('atr', prop) + c);
  } else {
    s = s.replace(/(\/\/[^\n]*|\/\*[\s\S]*?\*\/|`[^`]*`|'[^']*'|"[^"]*")/g, m => mk(m[0]==='/' ? 'cm' : 'str', m));
    s = s.replace(/\b(const|let|var|function|return|if|else|for|while|do|switch|case|break|continue|class|extends|super|new|delete|void|yield|static|get|set|throw|async|await|import|export|from|default|of|in|typeof|instanceof)\b/g, m => mk('kw', m));
    s = s.replace(/\b(this|null|undefined|true|false|NaN)\b/g, m => mk('kw', m));
    s = s.replace(/\b(\d+(?:\.\d+)?)\b/g, m => mk('num', m));
  }
  return s.replace(/\uE000([\uE100-\uF8FF])/g, (m, c) => slots[c.charCodeAt(0) - 0xE100]);
}

      id:'css-flexgrid', ico:'🔲', lec:'Lec 6', title:'Flexbox & Grid',
      body:`
        <p>Flexbox and Grid are the two modern layout systems. The one line that answers most exam questions: <b>Flexbox is one-dimensional, Grid is two-dimensional.</b></p>
        ${DIAG.flexVsGrid}
        <h4>Flexbox — one dimension (a row OR a column)</h4>
        <pre class="code"><span class="code-label">css</span>${hl(`.container {
  display: flex;
  justify-content: space-between; /* main axis */
  align-items: center;            /* cross axis */
  gap: 20px;
}
.item { order: 2; }               /* reorder items */`,'css')}</pre>
        <ul>
          <li><kbd>justify-content</kbd> aligns along the main axis; <kbd>align-items</kbd> along the cross axis.</li>
          <li><kbd>order</kbd> controls item sequence — not <code class="inl">flex-order</code> or <code class="inl">flex-placement</code>.</li>
          <li>Spacing between items is <kbd>gap</kbd>, not <code class="inl">content-gap</code>.</li>
        </ul>
        <h4>Grid — two dimensions (rows AND columns)</h4>
        <pre class="code"><span class="code-label">css</span>${hl(`.grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;  /* 3 columns */
  grid-template-rows: auto;
  gap: 16px;
}`,'css')}</pre>
        <p>Column count comes from <kbd>grid-template-columns</kbd> — not <code class="inl">grid-column-count</code> or <code class="inl">grid-column-length</code>.</p>
        <div class="callout tip"><b>When to use which:</b> Flexbox for content laid out in a single direction (nav bars, button rows, distributing space). Grid for true 2D layouts (page templates, card galleries that align in rows <i>and</i> columns). They compose well: Grid for the page, Flexbox inside cells.</div>`
    },
    {
      id:'css-responsive', ico:'📱', lec:'Lec 6', title:'Responsive design & units',
      body:`
        <h4>Media queries</h4>
        <pre class="code"><span class="code-label">css</span>${hl(`@media (min-width: 600px) {
  body { padding: 40px; }
}`,'css')}</pre>
        <p>The at-rule is <kbd>@media</kbd> — not <code class="inl">@query</code>, <code class="inl">@responsive</code>, or <code class="inl">@viewport</code>. Inside, only real declarations work (<code class="inl">display: wide</code> is invalid).</p>
        <h4>Hard-coded vs fluid units</h4>
        ${DIAG.units}
        <table class="ctable">
          <tr><th>Unit</th><th>Type</th><th>Trade-off</th></tr>
          <tr><td><code>px</code></td><td>Absolute</td><td>Precise & predictable, but doesn't scale with user settings or viewport</td></tr>
          <tr><td><code>rem</code></td><td>Relative to root font-size</td><td>Scales with user's font preference → accessible & consistent</td></tr>
          <tr><td><code>%</code> / <code>vw</code> / <code>vh</code></td><td>Relative to parent / viewport</td><td>Fluid across screen sizes, but can be unpredictable in nested contexts</td></tr>
        </table>
        <div class="callout tip"><b>Mobile-first</b> = write base styles for small screens, then <i>add</i> complexity at larger breakpoints with <code class="inl">min-width</code> queries. It solves the problem of overriding desktop styles down to mobile, keeps CSS leaner, and matches how most users actually browse. Non-technical strategies: flexible images, content prioritisation, generous tap targets.</div>`
    },
    {
      id:'css-pseudo', ico:'✨', lec:'Lec 6', title:'Pseudo-classes, pseudo-elements, transitions & animations',
      body:`
        <h4>Pseudo-classes vs pseudo-elements</h4>
        <table class="ctable">
          <tr><th></th><th>Pseudo-class (<code>:</code>)</th><th>Pseudo-element (<code>::</code>)</th></tr>
          <tr><td>Targets</td><td>A <b>state</b> of an existing element</td><td>A <b>part</b> of an element you can style/generate</td></tr>
          <tr><td>Syntax</td><td>Single colon <code>:hover</code></td><td>Double colon <code>::before</code></td></tr>
          <tr><td>Examples</td><td><code>:hover</code> <code>:focus</code> <code>:active</code> <code>:nth-child()</code></td><td><code>::before</code> <code>::after</code> <code>::first-line</code></td></tr>
        </table>
        <pre class="code"><span class="code-label">css</span>${hl(`a:hover { color: #0088cc; }
.box::after { content: ''; }   /* generated content needs 'content' */`,'css')}</pre>
        <h4>Transitions vs animations</h4>
        <ul>
          <li><b>Transition</b> = simple A→B change triggered by a state (e.g. on hover). <code class="inl">transition: all 0.4s ease;</code></li>
          <li><b>Animation</b> = a timeline with <code class="inl">@keyframes</code>; can loop and define many steps.</li>
        </ul>
        <pre class="code"><span class="code-label">css</span>${hl(`@keyframes slide { from { left: 0; } to { left: 100px; } }
.x { animation: slide 2s ease infinite; }`,'css')}</pre>
        <div class="callout tip"><b>Performance:</b> animate <code class="inl">transform</code> and <code class="inl">opacity</code> — they're GPU-composited and avoid layout/paint. Avoid animating <code class="inl">width</code>/<code class="inl">top</code>/<code class="inl">margin</code>. Respect <code class="inl">@media (prefers-reduced-motion: reduce)</code> for accessibility.</div>`
    }
  ],

  js:[
    {
      id:'js-oop', ico:'🧠', lec:'Lec 1–2', title:'OOP fundamentals: the four pillars',
      body:`
        <p>The course opens with <b>Object-Oriented Programming</b> as the conceptual foundation — it's the mental model behind JavaScript objects, prototypes, and ES6 classes later in the course. OOP organises code around <b>objects</b>: self-contained bundles of <b>data (properties/state)</b> and <b>behaviour (methods)</b> that model real-world things.</p>
        ${DIAG.oopPillars}
        <h4>The four pillars in depth</h4>
        <table class="ctable">
          <tr><th>Pillar</th><th>Meaning</th><th>In JS</th></tr>
          <tr><td><b>Encapsulation</b></td><td>Bundle data + the methods that act on it into one unit, and hide internal detail behind a public interface.</td><td>Objects/classes; private state via closures or <code>#fields</code></td></tr>
          <tr><td><b>Abstraction</b></td><td>Expose only what's necessary; hide complexity behind a simple interface.</td><td>A method name like <code>user.save()</code> hides the how</td></tr>
          <tr><td><b>Inheritance</b></td><td>A child type reuses and specialises a parent type's members.</td><td><code class="inl">class Dog extends Animal</code></td></tr>
          <tr><td><b>Polymorphism</b></td><td>"Many forms" — the same call behaves differently depending on the object.</td><td>A subclass <b>overrides</b> a method (e.g. each shape's own <code>area()</code>)</td></tr>
        </table>
        <pre class="code"><span class="code-label">javascript</span>${hl(`// Encapsulation + abstraction: state and behaviour together
class BankAccount {
  #balance = 0;                       // private field (hidden detail)
  deposit(amount) { this.#balance += amount; }   // public interface
  get balance() { return this.#balance; }
}

// Inheritance + polymorphism
class Shape { area() { return 0; } }
class Circle extends Shape {
  constructor(r) { super(); this.r = r; }
  area() { return Math.PI * this.r ** 2; }   // overrides → polymorphism
}
const shapes = [new Shape(), new Circle(2)];
shapes.forEach(s => console.log(s.area())); // same call, different result`,'javascript')}</pre>
        <h4>Class vs object (instance)</h4>
        <p>A <b>class</b> is the blueprint; an <b>object/instance</b> is a concrete thing built from it with <code class="inl">new</code>. One class → many independent instances, each with its own state.</p>
        <div class="callout tip"><b>Why OOP:</b> it makes code <b>reusable</b> (inheritance), <b>maintainable</b> (encapsulation localises change), and <b>easier to reason about</b> (abstraction hides noise). These exact benefits are strong open-ended answers — and they connect directly to the prototypes/classes topic below.</div>`
    },
    {
      id:'js-vars', ico:'📦', lec:'Lec 7', title:'Variables, types & operators',
      body:`
        <p>JavaScript values come in two families — <b>primitives</b> (simple, immutable, compared by value) and <b>objects</b> (collections, compared by reference). Knowing which is which explains most "surprising" exam results.</p>
        ${DIAG.typesMap}
        <h4>Strings you must know cold</h4>
        <pre class="code"><span class="code-label">javascript</span>${hl(`const name = "Ada Lovelace";
name.length;            // 12  — a PROPERTY, no ()
name.toUpperCase();     // "ADA LOVELACE"
name.includes("Ada");   // true  (boolean)
name.slice(0, 3);       // "Ada" — end index NOT included
\`Hi \${name}!\`;         // template literal: backticks + \${ }`,'javascript')}</pre>
        <div class="callout warn"><b>Coercion bait:</b> <code class="inl">"5" + 3</code> → <code class="inl">"53"</code> (+ with a string concatenates) but <code class="inl">"5" - 3</code> → <code class="inl">2</code> (− forces numbers). A favourite one-mark trap.</div>
        <h4>Boolean logic & short-circuiting</h4>
        <p><code class="inl">&amp;&amp;</code> and <code class="inl">||</code> don’t return true/false — they return <b>one of their operands</b>, stopping early ("short-circuit"):</p>
        <pre class="code"><span class="code-label">javascript</span>${hl(`a && b   // a falsy -> returns a (b never evaluated); else returns b
a || b   // a truthy -> returns a;  else returns b
const port = config.port || 3000;   // classic default (careful: 0 would be replaced!)
const safe = user && user.name;     // guard: only read .name if user exists
!value   // NOT - flips truthiness; !!value coerces to a real boolean`,'javascript')}</pre>

        <table class="ctable">
          <tr><th>Keyword</th><th>Reassign?</th><th>Scope</th><th>Hoisting</th></tr>
          <tr><td><code>const</code></td><td>No</td><td>Block</td><td>Not usable before declaration (TDZ)</td></tr>
          <tr><td><code>let</code></td><td>Yes</td><td>Block</td><td>TDZ</td></tr>
          <tr><td><code>var</code></td><td>Yes</td><td>Function</td><td>Hoisted as <code>undefined</code></td></tr>
        </table>
        <p><b>Primitive types:</b> String, Number, Boolean, <code class="inl">null</code>, <code class="inl">undefined</code>, Symbol, BigInt. Plus the reference types Object, Array, Function.</p>
        <div class="callout warn"><b>Reassigning a <code class="inl">const</code> throws a TypeError.</b> A frequent error-spotting item: declaring <code class="inl">const result = 1;</code> then doing <code class="inl">result *= i;</code> inside a loop, or <code class="inl">const colors = [...]</code> then <code class="inl">colors = 'red'</code>. (Note: you <i>can</i> mutate a const array with <code class="inl">.push()</code> — you just can't reassign the binding.)</div>
        <h4>Key operators</h4>
        <ul>
          <li><kbd>===</kbd> strict equality (no type coercion) vs <kbd>==</kbd> loose (coerces types).</li>
          <li><kbd>??</kbd> nullish coalescing — returns the right side only if the left is <code class="inl">null</code>/<code class="inl">undefined</code>.</li>
          <li><kbd>&amp;&amp;</kbd> <kbd>||</kbd> <kbd>!</kbd> logical. Not <code class="inl">&amp;</code>/<code class="inl">|</code> (those are bitwise) and not <code class="inl">&gt;&gt;</code> for comparison (that's a bit-shift).</li>
        </ul>`
    },
    {
      id:'js-functions', ico:'🔧', lec:'Lec 9', title:'Functions, hoisting, scope & closures',
      body:`
        <pre class="code"><span class="code-label">javascript</span>${hl(`function add(a, b) { return a + b; }      // declaration (hoisted)
const mul = (a, b) => a * b;              // arrow expression`,'javascript')}</pre>
        <div class="callout warn"><b>Declaration syntax traps:</b> <code class="inl">func name() {}</code> (should be <code class="inl">function</code>), <code class="inl">function name[n] {}</code> (params use <code class="inl">()</code>, not <code class="inl">[]</code>), <code class="inl">function name { }</code> (missing parens entirely), and <code class="inl">function: name()</code> (no colon).</div>
        <h4>Hoisting</h4>
        <p>The interpreter makes two passes. The first registers <b>function declarations</b>, so you can call them before they appear. Functions assigned to <code class="inl">let</code>/<code class="inl">const</code> are <b>not</b> hoisted that way.</p>
        <h4>Scope & closures</h4>
        <p>A <b>closure</b> is a function bundled together with the variables from the scope where it was <i>defined</i> — and it keeps a <b>live reference</b> to them (not a copy), even after that outer function has returned. That captured, still-mutable state is what makes "private" variables in JS possible.</p>
        ${DIAG.scopeChain}
        <pre class="code"><span class="code-label">javascript</span>${hl(`function counter() {
  let count = 0;                 // private
  return () => ++count;          // inner fn keeps access to count
}
const next = counter();
next(); // 1
next(); // 2`,'javascript')}</pre>
        <p>Real-world uses: private variables, function factories (a function that builds customised functions), event handlers that remember setup data, debouncing.</p>`
    },
    {
      id:'js-control', ico:'🔁', lec:'Lec 8–9', title:'Control flow, loops & arrays',
      body:`
        <h4>Loops</h4>
        <p>A <code class="inl">for</code> loop has three semicolon-separated parts, and they run in a specific order. The <kbd>;</kbd> separators (not commas) are a favourite error-spotting plant.</p>
        ${DIAG.loopAnatomy}
        <h4>switch — multi-way branching</h4>
        <pre class="code"><span class="code-label">javascript</span>${hl(`switch (fruit) {
  case "apple":            // compared with === (strict!)
    price = 10;
    break;                 // without break, execution FALLS THROUGH
  case "pear":
  case "plum":             // stacked cases share one branch
    price = 12;
    break;
  default:                 // runs when nothing matched
    price = 0;
}`,'javascript')}</pre>
        <div class="callout warn"><b>The plant:</b> a missing <code class="inl">break</code> makes execution fall through into the next case — and <code class="inl">switch</code> compares with <b>strict</b> equality, so <code class="inl">"2"</code> won’t match <code class="inl">case 2</code>.</div>

        <pre class="code"><span class="code-label">javascript</span>${hl(`for (let i = 0; i < arr.length; i++) { ... }   // note ; separators
while (cond) { ... }
do { ... } while (cond);   // runs AT LEAST ONCE`,'javascript')}</pre>
        <ul>
          <li><b><code class="inl">do…while</code> always runs at least once</b> — it checks the condition <i>after</i> the body. (Frequent MCQ.)</li>
          <li>A <code class="inl">for</code> header uses <b>semicolons</b>: <code class="inl">for (let i=0; i&lt;n; i++)</code>. Using commas (<code class="inl">for (let i=0, i&lt;n; i++)</code>) is a syntax error.</li>
          <li>You can't put <code class="inl">let i = 1</code> inside a <code class="inl">while(...)</code> condition.</li>
        </ul>
        <h4>Array methods you must recognise</h4>
        <table class="ctable">
          <tr><th>Method</th><th>Does</th></tr>
          <tr><td><code>push()</code></td><td>Add to end</td></tr>
          <tr><td><code>pop()</code></td><td>Remove from end</td></tr>
          <tr><td><code>shift()</code></td><td>Remove from start</td></tr>
          <tr><td><code>unshift()</code></td><td>Add to start</td></tr>
        </table>
        <div class="callout warn"><b>Common fakes:</b> <code class="inl">arr.add()</code>, <code class="inl">arr.remove()</code> don't exist. Length is a <b>property</b>: <code class="inl">arr.length</code>, not <code class="inl">arr.length()</code>. Index access uses brackets <code class="inl">arr[i]</code>, not <code class="inl">arr(i)</code>. Array literals use <code class="inl">[ ]</code>; passing <code class="inl">{1,2,3}</code> to a function is invalid object syntax.</div>`
    },
    {
      id:'js-objects', ico:'🧱', lec:'Lec 11–12', title:'Objects, "this", prototypes & classes',
      body:`
        <pre class="code"><span class="code-label">javascript</span>${hl(`const user = { name: 'Ada', greet() { return this.name; } };
user.role = 'admin';        // add a property (dot notation)
user['age'] = 30;           // or bracket notation`,'javascript')}</pre>
        <p>Add properties with <code class="inl">obj.key = value</code> or <code class="inl">obj['key'] = value</code> — not <code class="inl">obj.add()</code>, <code class="inl">obj.set()</code>, or <code class="inl">obj.addProperty()</code>.</p>
        <h4>The <code class="inl">this</code> keyword</h4>
        <p>Inside a method, <code class="inl">this</code> refers to <b>the object the method was called on</b>. Arrow functions don't bind their own <code class="inl">this</code> — they inherit it from the surrounding scope.</p>
        <h4>Prototypal inheritance & ES6 classes</h4>
        <pre class="code"><span class="code-label">javascript</span>${hl(`class Animal {
  constructor(name) { this.name = name; }
  speak() { return this.name + ' makes a sound'; }
}
class Dog extends Animal {
  constructor(name, breed) {
    super(name);            // call parent constructor
    this.breed = breed;
  }
  speak() { return this.name + ' barks'; }
}`,'javascript')}</pre>
        ${DIAG.protoChain}
        <p>Every object links to a <b>prototype</b> object. When you read <code class="inl">dog.speak()</code>, JS looks on <code class="inl">dog</code> first, then walks <i>up the prototype chain</i> until it finds <code class="inl">speak</code> (or reaches <code class="inl">null</code>). Methods are therefore <b>shared</b> through the prototype, not copied into every instance. ES6 <code class="inl">class</code> is <b>syntactic sugar</b> over this: class methods live on the prototype, <code class="inl">extends</code> links one prototype to the next, and <code class="inl">super</code> calls the parent. Being able to say "classes are sugar over prototypes" and explain the chain is a recurring open-ended answer.</p>`
    },
    {
      id:'js-dom', ico:'🌳', lec:'Lec 10', title:'DOM selection, manipulation & performance',
      body:`
        <p>Almost every interactive feature is the same four-step loop. Internalise it and the DOM stops feeling like a grab-bag of methods.</p>
        ${DIAG.domCycle}
        <div class="callout tip"><b>Why <code class="inl">&lt;script&gt;</code> goes before <code class="inl">&lt;/body&gt;</code>:</b> the browser builds the DOM top-to-bottom; a script in <code class="inl">&lt;head&gt;</code> runs before the elements exist, so <code class="inl">getElementById</code> returns <code class="inl">null</code>. Either place the script at the end of body, or keep it in head with the <code class="inl">defer</code> attribute (downloads now, runs after parsing).</div>

        <h4>1 · Selecting elements</h4>
        <table class="ctable">
          <tr><th>Method</th><th>Returns</th></tr>
          <tr><td><code>getElementById('x')</code></td><td>One element by id</td></tr>
          <tr><td><code>getElementsByClassName('x')</code></td><td>Live HTMLCollection</td></tr>
          <tr><td><code>querySelector('.x')</code></td><td>First match for a CSS selector</td></tr>
          <tr><td><code>querySelectorAll('.x')</code></td><td>Static NodeList of all matches</td></tr>
        </table>
        <p>It's <code class="inl">getElementById</code> (singular "Element") — not <code class="inl">getElementsById</code>, <code class="inl">getElementsFromId</code>, or the invented <code class="inl">getElementsByDiv</code>.</p>
        <h4>Creating & modifying</h4>
        <pre class="code"><span class="code-label">javascript</span>${hl(`const li = document.createElement('li');
li.textContent = 'New item';
list.appendChild(li);
el.classList.toggle('active');`,'javascript')}</pre>
        <div class="callout tip"><b>Performance:</b> every DOM change can trigger reflow/repaint. Batch updates — build nodes in a <code class="inl">DocumentFragment</code> or build an HTML string and assign once, instead of appending inside a loop. Cache element references rather than re-querying. This is the model answer to "minimise performance impact".</div>`
    },
    {
      id:'js-window', ico:'🪟', lec:'Lec 10', title:'The Window object (BOM): screen, navigator, location, timers',
      body:`
        <p>The browser exposes everything through a top-level <code class="inl">window</code> object — the root of the <b>DOM/BOM tree</b>. <code class="inl">document</code> is just one of its children. Because <code class="inl">window</code> is the global namespace, you can drop the prefix: <code class="inl">window.alert()</code> → <code class="inl">alert()</code>, <code class="inl">window.onload</code> → <code class="inl">onload</code>.</p>
        <pre class="code"><span class="code-label">text</span>window
 ├─ document   → the page (the DOM you manipulate)
 ├─ navigator  → info about the browser
 ├─ screen     → the user's monitor
 ├─ location   → the current URL
 └─ history    → the session's page history</pre>
        <h4>Child objects worth knowing</h4>
        <table class="ctable">
          <tr><th>Object / member</th><th>Gives you</th></tr>
          <tr><td><code>window.screen.width / .height</code></td><td>Monitor resolution; <code>availWidth/availHeight</code> exclude the taskbar; <code>colorDepth</code> = colour capability.</td></tr>
          <tr><td><code>window.navigator.userAgent</code></td><td>Browser/OS string. <code>navigator.platform</code> = the OS.</td></tr>
          <tr><td><code>window.location.href</code></td><td>Current URL (assigning to it navigates). <code>location.reload()</code> reloads.</td></tr>
          <tr><td><code>window.history.back() / .forward()</code></td><td>Move through travel history, like the browser buttons.</td></tr>
        </table>
        <h4>Dialogs & timers</h4>
        <pre class="code"><span class="code-label">javascript</span>${hl(`alert('Hi');                         // simple message box
const ok = confirm('Delete?');       // returns true/false
const name = prompt('Your name?');   // returns the typed string or null

const id = setTimeout(() => run(), 1000);   // once, after 1s
clearTimeout(id);
const t = setInterval(tick, 1000);          // repeatedly, every 1s
clearInterval(t);`,'javascript')}</pre>
        <div class="callout tip"><b>Feature detection over browser detection:</b> the textbook stresses checking <i>whether a feature exists</i> (e.g. <code class="inl">if ('addEventListener' in window)</code>) rather than sniffing <code class="inl">navigator</code> to guess the browser — sniffing is brittle and considered bad practice.</div>
        <div class="callout warn"><b>Trap:</b> <code class="inl">setTimeout</code>/<code class="inl">setInterval</code> take the <b>function first, delay second</b>: <code class="inl">setTimeout(fn, 1000)</code>. Passing <code class="inl">setTimeout(1000, fn)</code> or calling the function immediately with <code class="inl">setTimeout(fn(), 1000)</code> are classic mistakes.</div>`
    },
    {
      id:'js-events', ico:'⚡', lec:'Lec 10', title:'Events & event handling',
      body:`
        <p>An <b>event</b> is something that happens in the page (click, keydown, change, submit, load). You attach an <b>event handler</b> with <code class="inl">addEventListener</code>.</p>
        ${DIAG.eventBubbling}
        <pre class="code"><span class="code-label">javascript</span>${hl(`const btn = document.getElementById('save');
btn.addEventListener('click', function (event) {
  event.preventDefault();          // stop default (e.g. form submit)
  console.log('clicked!');
});`,'javascript')}</pre>
        <ul>
          <li>It's <kbd>addEventListener('click', fn)</kbd> — not <code class="inl">createEventListener</code>. The event name is a <b>string</b>.</li>
          <li>Common events: <code class="inl">click</code>, <code class="inl">keydown</code>, <code class="inl">change</code>, <code class="inl">submit</code>, <code class="inl">load</code>. The page-ready event is <code class="inl">'DOMContentLoaded'</code>, not <code class="inl">'DocumentFinishedLoading'</code>.</li>
          <li><kbd>event.preventDefault()</kbd> stops the browser default (e.g. submitting a form / following a link).</li>
        </ul>
        <h4>Full flow (model answer shape)</h4>
        <p>① select the element → ② call <code class="inl">addEventListener</code> with an event name and a handler → ③ inside the handler, read <code class="inl">event</code> and run your logic (update the DOM, validate, fetch, etc.).</p>`
    },
    {
      id:'js-errors', ico:'🛡️', lec:'Lec 8', title:'Errors & exception handling',
      body:`
        ${DIAG.tryCatchFlow}
        <h4>Three kinds of error</h4>
        <ul>
          <li><b>Syntax error</b> — breaks the language rules; caught <i>before</i> the code runs (e.g. a missing bracket).</li>
          <li><b>Runtime error</b> (exception) — happens <i>during</i> execution (e.g. calling a method on <code class="inl">undefined</code>). Types include <code class="inl">ReferenceError</code>, <code class="inl">TypeError</code>, <code class="inl">RangeError</code>, <code class="inl">SyntaxError</code>.</li>
          <li><b>Logical error</b> — code runs but produces the wrong result; no error thrown.</li>
        </ul>
        <h4>try / catch / finally</h4>
        <pre class="code"><span class="code-label">javascript</span>${hl(`try {
  if (day > 31) throw new RangeError('Day cannot exceed 31');
} catch (err) {
  console.log(err.name + ': ' + err.message);
} finally {
  console.log('Always runs');
}`,'javascript')}</pre>
        <p>The <code class="inl">try</code> block holds risky code; <code class="inl">catch</code> receives the error object (with <code class="inl">.name</code> and <code class="inl">.message</code>); <code class="inl">finally</code> runs regardless. You raise errors yourself with <code class="inl">throw</code>.</p>
        <div class="callout tip"><b>Why it matters:</b> good error handling keeps one failure from crashing the whole app, lets you show useful feedback, and makes the app reliable (e.g. catching a failed network request).</div>`
    },
    {
      id:'js-async', ico:'⏳', lec:'Lec 11', title:'Async JS: event loop, promises, async/await, fetch',
      body:`
        <h4>Why async?</h4>
        <p>JS is <b>single-threaded</b>: one thing at a time on the call stack. Long tasks (network, timers) are handed to <b>browser APIs</b>; when they finish, their callback joins the <b>task/callback queue</b>, and the <b>event loop</b> pushes it onto the stack only once the stack is empty. That's how a single thread stays responsive instead of freezing.</p>
        ${DIAG.eventLoop}
        <h4>Promises</h4>
        <p>A <b>Promise</b> is an object representing a value that isn't ready yet. It starts <b>pending</b> and later <b>settles</b> exactly once — either <b>fulfilled</b> with a value or <b>rejected</b> with an error — and can never change again. You react with <code class="inl">.then()</code> (fulfilled) and <code class="inl">.catch()</code> (rejected).</p>
        ${DIAG.promiseStates}
        <h4>JSON & checking the response</h4>
        <pre class="code"><span class="code-label">javascript</span>${hl(`// JSON = the text format APIs speak. Two converters:
const text = JSON.stringify({ id: 1 });   // object -> string  '{"id":1}'
const obj  = JSON.parse('{"id":1}');      // string -> object

const res = await fetch(url);
if (!res.ok) {                            // ok = status is 200-299
  throw new Error("HTTP " + res.status);  // fetch does NOT reject on 404!
}
const data = await res.json();            // parses the JSON body (async)`,'javascript')}</pre>
        <div class="callout tip"><b>Subtle but tested:</b> <code class="inl">fetch</code> only rejects on <i>network</i> failure. A 404 or 500 still <b>fulfils</b> the promise — you must check <code class="inl">res.ok</code> / <code class="inl">res.status</code> yourself.</div>

        <h4>fetch</h4>
        <pre class="code"><span class="code-label">javascript</span>${hl(`fetch('https://api.example.com/data')
  .then(res => res.json())
  .then(data => console.log(data))
  .catch(err => console.log(err));`,'javascript')}</pre>
        <p>The correct shape: <code class="inl">fetch(url).then(res =&gt; res.json()).then(...)</code>. There's no <code class="inl">fetchAPI()</code>, <code class="inl">.parseJSON()</code>, or bare <code class="inl">get()</code>.</p>
        <h4>async / await</h4>
        <pre class="code"><span class="code-label">javascript</span>${hl(`async function load() {
  try {
    const res = await fetch(url);
    const data = await res.json();
    return data;
  } catch (err) { console.log(err); }
}`,'javascript')}</pre>
        <p><code class="inl">async/await</code> lets you write asynchronous code that <i>reads</i> like synchronous code, flattening "callback hell" (deeply nested callbacks) into a clean top-to-bottom sequence.</p>
        <div class="callout"><b><code class="inl">Promise.all([...])</code></b> runs several promises concurrently and resolves when <i>all</i> succeed (returning an array of results). Caveat: if <b>any one</b> rejects, the whole thing rejects immediately — use <code class="inl">Promise.allSettled</code> if you need every result regardless.</div>`
    },
    {
      id:'js-modules', ico:'📚', lec:'Lec 13', title:'ES Modules',
      body:`
        <p>A <b>module</b> is a file with its own scope that explicitly declares what it shares (<code class="inl">export</code>) and what it needs (<code class="inl">import</code>). Entry point: <code class="inl">&lt;script type="module" src="main.js"&gt;</code>.</p>
        <pre class="code"><span class="code-label">javascript</span>${hl(`// math.js
export const mul = (a, b) => a * b;     // named export
export default function add(a,b){ return a+b; }  // default

// main.js
import add, { mul } from './math.js';`,'javascript')}</pre>
        ${DIAG.modules}
        <table class="ctable">
          <tr><th></th><th>Named export</th><th>Default export</th></tr>
          <tr><td>How many</td><td>Many per file</td><td>One per file</td></tr>
          <tr><td>Import syntax</td><td><code>import { x } from ...</code></td><td><code>import x from ...</code></td></tr>
          <tr><td>Naming</td><td>Must match (or alias with <code>as</code>)</td><td>You choose any name</td></tr>
        </table>
        <ul>
          <li><b>Live bindings:</b> imports are references, not copies — if the exporter updates the value, importers see the change.</li>
          <li><b>Barrel</b> = an <code class="inl">index.js</code> that re-exports from several modules to give one clean public API surface (<code class="inl">export { x } from './x.js'</code>).</li>
          <li>Named exports are <b>tree-shake friendly</b> (unused ones can be dropped by bundlers).</li>
        </ul>
        <div class="callout tip"><b>Benefits of modular code:</b> reusability, clear dependencies, easier testing/maintenance, and avoiding global-scope pollution.</div>`
    }
  ]
};

  /* ---- the syntax checker ---- */
  function runLint(){
    const code = editor.value;
    const lines = code.split('\n');
    let issues = [];
    const add=(ln,msg,type='err')=>issues.push({ln,msg,type});

    if(mode==='html'){
      lines.forEach((l,i)=>{
        const n=i+1;
        if(/lang\s*=\s*"(?!.{2}")[a-z]{3,}"/i.test(l)) add(n,'lang should be a 2-letter code (e.g. "en"), not a full word.');
        if(/<css[\s>]/i.test(l)) add(n,'<css> is not a tag — load stylesheets with <link rel="stylesheet">.');
        if(/<img[^>]*\shref=/i.test(l)) add(n,'<img> uses src, not href.');
        const open=l.match(/<h([1-6])>/i), close=l.match(/<\/h([1-6])>/i);
        if(open&&close&&open[1]!==close[1]) add(n,`Mismatched heading: <h${open[1]}> closed by </h${close[1]}>.`);
        if(/<\/ol>/.test(l) && code.indexOf('<ol')===-1 && code.indexOf('<ul')!==-1) add(n,'</ol> closes a list that was opened with <ul> — use </ul>.');
        if(/<\/ul>/.test(l) && code.indexOf('<ul')===-1 && code.indexOf('<ol')!==-1) add(n,'</ul> closes a list that was opened with <ol> — use </ol>.');
        if(/<textarea[^>]*>\s*<textarea>/i.test(l)) add(n,'<textarea> must close with </textarea>.');
      });
      // unclosed common tags (very rough)
      ['div','section','article','main','ul','form'].forEach(tag=>{
        const o=(code.match(new RegExp('<'+tag+'[\\s>]','gi'))||[]).length;
        const c=(code.match(new RegExp('</'+tag+'>','gi'))||[]).length;
        if(o>c) add(0,`${o-c} unclosed <${tag}> ${o-c>1?'tags':'tag'} — every <${tag}> needs a </${tag}>.`);
      });
    }
    else if(mode==='css'){
      const fake={'font-type':'font-family','text-color':'color','background-img':'background-image / background-color','underliner':'text-decoration'};
      lines.forEach((l,i)=>{
        const n=i+1;
        Object.keys(fake).forEach(f=>{ if(new RegExp('\\b'+f+'\\s*:').test(l)) add(n,`"${f}" is not a property — use ${fake[f]}.`); });
        if(/;\s*\w/.test(l) && /^\s*[\w-]+\s*;/.test(l)) add(n,'Looks like a colon was replaced by a semicolon (e.g. display; none → display: none).');
        if(/float\s*:\s*(top|down|up|bottom)/i.test(l)) add(n,'float only takes left | right | none.');
        if(/position\s*:\s*(float|wide)/i.test(l)) add(n,'invalid position value (use static|relative|absolute|fixed|sticky).');
        if(/:\s*\d+\s*;/.test(l) && !/(z-index|opacity|line-height|flex|order|column|grid|font-weight)/.test(l) && /(width|height|margin|padding|font-size|top|left|right|bottom)\s*:/.test(l)) add(n,'numeric length is missing a unit (e.g. 24 → 24px).',( 'warn'));
        // missing semicolon: a declaration line not ending in ; { } or comment
        const tr=l.trim();
        if(/^[\w-]+\s*:\s*[^;{}]+$/.test(tr) && !tr.endsWith(';') && !tr.endsWith('{')) add(n,'Missing semicolon at end of declaration.','warn');
      });
      const ob=(code.match(/{/g)||[]).length, cb=(code.match(/}/g)||[]).length;
      if(ob!==cb) add(0,`Unbalanced braces: ${ob} "{" vs ${cb} "}".`);
    }
    else { // js
      lines.forEach((l,i)=>{
        const n=i+1;
        if(/\bfunc\s+\w/.test(l)) add(n,'Keyword is "function", not "func".');
        if(/function\s+\w+\s*\[/.test(l)) add(n,'Function parameters use ( ), not [ ].');
        if(/for\s*\([^;]*,[^;]*;/.test(l)) add(n,'for header parts are separated by ; not , (e.g. for(let i=0; i<n; i++)).');
        if(/\.add\s*\(/.test(l) && /\b(colors|list|arr|items|nums)\b/.test(l)) add(n,'Arrays have no .add() — use .push().','warn');
        if(/console\.(logger|logs)\s*\(/.test(l)) add(n,'It’s console.log(), not console.logger().');
        if(/createEventListener/.test(l)) add(n,'Method is addEventListener, not createEventListener.');
        if(/\.length\s*\(\s*\)/.test(l)) add(n,'length is a property: arr.length (no parentheses).');
        if(/getElementsByDiv/.test(l)) add(n,'No getElementsByDiv — use getElementById / querySelector.');
        if(/\b(colors|list|nums|arr|items)\s*\(\s*[a-z]\s*\)/.test(l) && !/function|=>|\.forEach|\.map|\.filter|=\s*\(/.test(l)) add(n,'Array index uses brackets arr[i], not arr(i).','warn');
        if(/&\s*['"][^'"]*['"]\s*:/.test(l)) add(n,'Ternary needs ? … : … , not & … : … .');
        if(/DocumentFinishedLoading/.test(l)) add(n,'Use "DOMContentLoaded" — that event name isn’t real.');
      });
      // const reassignment (rough): const X = ...  then later  X =
      const consts=[...code.matchAll(/\bconst\s+([A-Za-z_$][\w$]*)/g)].map(m=>m[1]);
      consts.forEach(name=>{
        const re=new RegExp('(^|[^.\\w])'+name+'\\s*=\\s*[^=]','g');
        const assigns=(code.match(re)||[]).length;
        if(assigns>1) add(0,`"${name}" is const but reassigned — that throws a TypeError (use let, or mutate instead).`);
      });
      const op=(code.match(/\(/g)||[]).length, cp=(code.match(/\)/g)||[]).length;
      if(op!==cp) add(0,`Unbalanced parentheses: ${op} "(" vs ${cp} ")".`);
      const ob=(code.match(/{/g)||[]).length, cb=(code.match(/}/g)||[]).length;
      if(ob!==cb) add(0,`Unbalanced braces: ${ob} "{" vs ${cb} "}".`);
    }

    if(issues.length===0){
      lint.innerHTML = `<div class="row ok"><span class="ln">✓</span>No obvious syntax issues detected. (The checker covers common exam traps, not everything — keep verifying by eye.)</div>`;
    } else {

    }
  }

  // init

})();

const SRC_LABEL = {past:'Past paper', mod:'Modified', new:'New'};
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}

(function buildMCQ(){
  const v = document.getElementById('v-mcq');
  let pool=[], idx=0, score=0, answered=false, chosenLog=[];

  function setup(){
    v.innerHTML = `
    <div class="hero" style="padding:34px 0 10px">
      <div class="kicker">Section 1 simulator</div>
      <h2 style="font-size:clamp(28px,4vw,42px)">MCQ Drill</h2>
      <p class="lede">${MCQ.length} questions blending your past paper, re-exam, and likely new variants. Real scoring rules apply: <b>+1</b> correct, <b>−0.5</b> wrong, <b>0</b> blank. Pick a set.</p>
    </div>
    <div class="quiz-setup">
      <button class="qmode" data-f="all"><div class="em">🎲</div><h3>Full mix</h3><p>All ${MCQ.length} questions, shuffled.</p></button>
      <button class="qmode" data-f="html"><div class="em">🏗️</div><h3>HTML only</h3><p>Markup &amp; structure questions.</p></button>

    v.querySelectorAll('[data-f]').forEach(b=>b.addEventListener('click',()=>start(b.dataset.f)));
  }

  function start(f){
    pool = shuffle(f==='all'?MCQ:MCQ.filter(q=>q.tag===f));
    idx=0;score=0;answered=false;chosenLog=[];
    render();
  }

  function render(){
    if(idx>=pool.length) return results();
    const q=pool[idx]; answered=false;
    v.innerHTML = `
    <div class="hero" style="padding:26px 0 6px">
      <h2 style="font-size:24px;font-family:var(--disp)">MCQ Drill</h2>
    </div>
    <div class="q-card">
      <div class="q-top">
        <span class="q-counter">Question ${idx+1} / ${pool.length}</span>
        <span class="q-badge ${q.tag}">${q.tag.toUpperCase()}</span>
        <span class="q-badge ${q.src==='new'?'new':''}">${SRC_LABEL[q.src]}</span>
        <span class="q-counter" style="margin-left:auto">Score: ${score.toFixed(2)}</span>
      </div>
      <div class="q-stem">${q.q}</div>
      <div class="q-opts" id="opts">
        ${q.opts.map((o,i)=>`<div class="opt" data-i="${i}"><span class="ltr">${'ABCD'[i]}</span><span>${o}</span></div>`).join('')}
      </div>
      <div class="explain" id="exp"></div>
      <div class="q-nav">
        <button class="bigbtn ghost" id="skip">Skip (0 pts)</button>
        <div class="spacer"></div>
        <button class="bigbtn" id="next" disabled>Next →</button>
      </div>
    </div>`;

    const opts=v.querySelectorAll('.opt');
    opts.forEach(o=>o.addEventListener('click',()=>{
      if(answered)return; answered=true;
      const pick=+o.dataset.i, correct=q.c;
      chosenLog.push(pick===correct);
      opts.forEach((el,i)=>{
        el.classList.add('dim');
        if(i===correct){el.classList.remove('dim');el.classList.add('correct');}

      v.querySelector('#skip').disabled=true;
    }));

    v.querySelector('#skip').addEventListener('click',()=>{ if(!answered){chosenLog.push(null);} idx++; render(); });

  }

  function results(){
    const correct=chosenLog.filter(x=>x===true).length;

    const pct=Math.max(0,Math.round(score/max*100));

      <div style="margin-top:24px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="bigbtn" id="again">Try again</button>
        <button class="bigbtn ghost" onclick="go('study')">Back to study</button>
      </div>
    </div>`;
    v.querySelector('#again').addEventListener('click',setup);
  }

  setup();
})();

        else { out+=`<span class="tok" data-id="t${tokId++}">${esc(part)}</span>`; }
      });
      return out;
    };
    const emitError=(text,why,ref)=>{ const id='t'+(tokId++); reasons[id]={why,ref}; errCount++; return `<span class="tok" data-id="${id}" data-err="1">${esc(text)}</span>`; };
    const renderLine=(line)=>{
      if(typeof line==='string') return '<div>'+emitCorrect(line)+'</div>';
      const code=line.code, errs=line.errs||[];
      const spans=[]; let cursor=0;
      errs.forEach(({e,why,ref})=>{ const i=code.indexOf(e,cursor); if(i===-1) return; spans.push({start:i,end:i+e.length,why,ref}); cursor=i+e.length; });
      spans.sort((a,b)=>a.start-b.start);
      let out='', pos=0;
      spans.forEach(sp=>{ if(sp.start>pos) out+=emitCorrect(code.slice(pos,sp.start)); out+=emitError(code.slice(sp.start,sp.end),sp.why,sp.ref); pos=sp.end; });
      if(pos<code.length) out+=emitCorrect(code.slice(pos));
      return '<div>'+out+'</div>';
    };
    const linesHtml = snip.lines.map(renderLine).join('');

    v.innerHTML=`
    <div class="hero" style="padding:26px 0 6px"><h2 style="font-size:24px;font-family:var(--disp)">Find the Error</h2></div>
    <div class="q-card">
      <div class="q-top">
        <span class="q-counter">Snippet ${idx+1} / ${pool.length}</span>
        <span class="q-badge ${snip.lang}">${snip.lang.toUpperCase()}</span>
        <span class="q-badge ${snip.src==='mod'?'':'new'}">${SRC_LABEL[snip.src]}</span>
        <span class="q-counter" style="margin-left:auto">Mark every error you find</span>
      </div>
      <div class="q-stem" style="font-size:15px;color:var(--ink-dim)">${esc(snip.title)} — click the <b>specific wrong token(s)</b>. Most tokens are correct; circling correct code costs <b>−0.25</b>.</div>
      <div class="fe-help">Selected: <span id="selCount">0</span> · click again to deselect</div>
      <div class="fe-code" id="code">${linesHtml}</div>
      <div class="errlist" id="errlist"></div>
      <div class="fe-score" id="feScore"></div>
      <div class="q-nav">
        <button class="bigbtn ghost" id="reveal">Check ✓</button>
        <div class="spacer"></div>
        <button class="bigbtn" id="next" ${'disabled'}>Next →</button>
      </div>
    </div>`;

    const codeEl=v.querySelector('#code');
    codeEl.querySelectorAll('.tok').forEach(t=>{
      t.addEventListener('click',()=>{
        if(checked)return;
        const id=t.dataset.id;
        if(picks.has(id)){picks.delete(id);t.classList.remove('picked');}
        else{picks.add(id);t.classList.add('picked');}
        v.querySelector('#selCount').textContent=picks.size;
      });
    });

    v.querySelector('#reveal').addEventListener('click',()=>{
      if(checked)return; checked=true;
      let found=0, wrong=0;
      codeEl.querySelectorAll('.tok').forEach(t=>{
        const id=t.dataset.id, isErr=t.dataset.err==='1', picked=picks.has(id);
        t.style.cursor='default';
        if(isErr&&picked){t.classList.remove('picked');t.classList.add('hit');found++;}
        else if(isErr&&!picked){t.classList.add('missed');}
        else if(!isErr&&picked){t.classList.remove('picked');t.classList.add('miss-pick');wrong++;}
      });
      const pts=Math.max(0,found - wrong*0.25);
      totalFound+=found; totalErrs+=errCount; totalWrong+=wrong;
      v.querySelector('#feScore').innerHTML=`Found <b style="color:var(--ok)">${found}/${errCount}</b> · wrong circles <b style="color:var(--red)">${wrong}</b> · snippet score <b>${pts.toFixed(2)}</b>`;
      // explanation list
      const el=v.querySelector('#errlist'); el.classList.add('show');
      let items='<h5>The errors in this snippet</h5>';
      Object.keys(reasons).forEach(id=>{ const r=reasons[id]; items+=`<div class="ei">${r.why}${r.ref?` <a class="ei-ref" onclick="openTopic('${r.ref}')">→ review the theory</a>`:''}</div>`; });
      el.innerHTML=items;
      v.querySelector('#reveal').disabled=true;
      v.querySelector('#next').disabled=false;
    });

    v.querySelector('#next').addEventListener('click',()=>{idx++;render();});
  }

  function results(){
    const pts=Math.max(0,totalFound-totalWrong*0.25);
    const pct=totalErrs?Math.round(totalFound/totalErrs*100):0;
    v.innerHTML=`
    <div class="hero" style="padding:30px 0 6px"><h2 style="font-size:24px;font-family:var(--disp)">Results</h2></div>
    <div class="q-card result">
      <div class="score" style="color:${pct>=60?'var(--grn)':'var(--red)'}">${totalFound}<span style="font-size:28px;color:var(--ink-dim)">/${totalErrs}</span></div>
      <div class="pct">${pct}% of errors found · ${totalWrong} wrong circles · net ${pts.toFixed(2)} pts</div>
      <div class="verdict-grade" style="color:${pct>=60?'var(--grn-soft)':'var(--amber)'}">${pct>=90?'Eagle eyes 🦅':pct>=75?'Sharp — minor misses 💪':pct>=60?'Solid, tighten precision ✅':'Re-drill the traps 📚'}</div>
      <div style="margin-top:24px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="bigbtn" id="again">Try again</button>
        <button class="bigbtn ghost" onclick="go('play')">Practise in playground</button>
      </div>
    </div>`;
    v.querySelector('#again').addEventListener('click',setup);
  }

  function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  setup();
})();

/* ============================================================
   FULL MOCK EXAM — timed 70-point simulation
   S1 MCQ (20·1pt) + S2 Find-the-error (9 snippets, scaled to 30) + S3 Open-ended (10·2pt)
   4-hour countdown · official grade bands (42/53/63) + open-ended gates (5/7/9)
   Self-contained: reuses shuffle, SRC_LABEL, go and the existing card styles.
   ============================================================ */
(function buildMock(){
  const v = document.getElementById('v-mock');

  const DUR = 4*60*60;                         // 14400 seconds
  let mcqSet=[], feSet=[], feMeta=[], oeSet=[];
  let mcqPick=[], fePicks=[], oeText=[], oeScore=[];
  let mcqFlag=[], oeFlag=[];
  let remaining=DUR, timerId=null, sec='s1', gradeData=null, keyHandler=null;
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  /* ---------- sampling ---------- */
  function sample(){
    mcqSet = shuffle(MCQ).slice(0,20);
    const byLang = L => shuffle(FE.filter(s=>s.lang===L)).slice(0,3);
    feSet  = [...byLang('html'), ...byLang('css'), ...byLang('js')];
    feMeta = feSet.map((s,i)=>tokenize(s,i));
    oeSet  = shuffle(OE).slice(0,10);
    mcqPick = Array(mcqSet.length).fill(null);
    fePicks = feSet.map(()=>new Set());
    oeText  = Array(oeSet.length).fill('');
    oeScore = Array(oeSet.length).fill(null);
    mcqFlag = Array(mcqSet.length).fill(false);
    oeFlag  = Array(oeSet.length).fill(false);
    remaining = DUR; sec='s1'; gradeData=null;
  }

  /* tokenize a snippet -> neutral clickable HTML + error ids + reasons (stable ids) */
  function tokenize(snip, si){
    let n=0; const errIds=new Set(); const reasons={};
    const emitC=t=>{let o='';t.split(/(\s+)/).forEach(p=>{if(p==='')return;if(/^\s+$/.test(p)){o+=p;}else{o+=`<span class="tok" data-id="s${si}t${n}">${esc(p)}</span>`;n++;}});return o;};
    const emitE=(t,w,ref)=>{const id='s'+si+'t'+n;n++;errIds.add(id);reasons[id]={why:w,ref};return `<span class="tok" data-id="${id}" data-err="1">${esc(t)}</span>`;};
    const line=ln=>{
      if(typeof ln==='string') return '<div>'+emitC(ln)+'</div>';
      const code=ln.code, errs=ln.errs||[], spans=[]; let cur=0;
      errs.forEach(({e,why,ref})=>{const i=code.indexOf(e,cur);if(i===-1)return;spans.push({s:i,e:i+e.length,why,ref});cur=i+e.length;});
      spans.sort((a,b)=>a.s-b.s); let o='',pos=0;
      spans.forEach(sp=>{if(sp.s>pos)o+=emitC(code.slice(pos,sp.s));o+=emitE(code.slice(sp.s,sp.e),sp.why,sp.ref);pos=sp.e;});
      if(pos<code.length)o+=emitC(code.slice(pos)); return '<div>'+o+'</div>';
    };
    return {html:snip.lines.map(line).join(''), errIds, reasons, errCount:errIds.size};
  }
  /* re-tokenize a snippet for review, applying hit / missed / wrong-circle states (same id order) */
  function reviewTokens(snip, si){
    let n=0; const picks=fePicks[si];
    const tok=(txt,isErr)=>{ const id='s'+si+'t'+n; n++; const picked=picks.has(id);
      let cls='tok';
      if(isErr&&picked)cls+=' hit'; else if(isErr&&!picked)cls+=' missed'; else if(!isErr&&picked)cls+=' miss-pick';
      return `<span class="${cls}" style="cursor:default">${esc(txt)}</span>`; };
    const emitC=t=>{let o='';t.split(/(\s+)/).forEach(p=>{if(p==='')return;if(/^\s+$/.test(p)){o+=p;}else{o+=tok(p,false);}});return o;};
    const line=ln=>{
      if(typeof ln==='string') return '<div>'+emitC(ln)+'</div>';
      const code=ln.code, errs=ln.errs||[], spans=[]; let cur=0;
      errs.forEach(({e})=>{const i=code.indexOf(e,cur);if(i===-1)return;spans.push({s:i,e:i+e.length});cur=i+e.length;});
      spans.sort((a,b)=>a.s-b.s); let o='',pos=0;
      spans.forEach(sp=>{if(sp.s>pos)o+=emitC(code.slice(pos,sp.s));o+=tok(code.slice(sp.s,sp.e),true);pos=sp.e;});
      if(pos<code.length)o+=emitC(code.slice(pos)); return '<div>'+o+'</div>';
    };
    return snip.lines.map(line).join('');
  }

  /* ---------- timer ---------- */
  function fmt(s){const h=s/3600|0,m=(s%3600)/60|0,x=s%60;return h+':'+String(m).padStart(2,'0')+':'+String(x).padStart(2,'0');}
